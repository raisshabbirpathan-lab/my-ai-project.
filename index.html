<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google SEO Meta Tags -->
    <title>SwiftSocial AI - Instant Social Media Content Generator</title>
    <meta name="description" content="Transform your text into viral LinkedIn posts, X threads, and Instagram captions instantly with SwiftSocial AI. Fast, original, and smart.">
    <meta name="keywords" content="AI content generator, social media tool, SwiftSocial, viral posts, text transformer">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .brand-logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        textarea {
            width: 100%;
            height: 130px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px;
            color: #fff;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        textarea:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 12px 8px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .action-btn:hover {
            background: #38bdf8;
            color: #020617;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }
        .output-box {
            position: relative;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 16px;
            text-align: left;
            min-height: 100px;
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
        }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
            color: #64748b;
        }
        .copy-btn {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #38bdf8;
            color: #020617;
        }
        footer {
            margin-top: 24px;
            font-size: 11px;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-logo">SwiftSocial AI</div>
        <div class="tagline">Instant & Smart Social Media Content Generator</div>

        <textarea id="inputText" placeholder="Paste your article or long transcript here..."></textarea>

        <div class="btn-group">
            <button class="action-btn" onclick="generateContent('linkedin')">LinkedIn Post</button>
            <button class="action-btn" onclick="generateContent('x')">X Thread</button>
            <button class="action-btn" onclick="generateContent('instagram')">IG Caption</button>
        </div>

        <div class="output-box">
            <div class="output-header">
                <span>Generated Output</span>
                <button class="copy-btn" onclick="copyText()">Copy Text</button>
            </div>
            <div id="outputText">Your repurposed content will appear here...</div>
        </div>

        <footer>&copy; 2026 SwiftSocial AI. All rights reserved.</footer>
    </div>

    <script>
        function generateContent(platform) {
            const input = document.getElementById('inputText').value;
            const outputDiv = document.getElementById('outputText');
            
            if(!input.trim()) {
                outputDiv.innerText = "Please enter some content first!";
                return;
            }

            outputDiv.innerText = "SwiftSocial AI is thinking...";
            
            // Yahan aapka baki ka logic (fetch/API) aayega jo pehle tha.
            // Typewriter effect ko integrate karne ke liye abhi hum temporary text dikha rahe hain.
            setTimeout(() => {
                let sampleText = `🚀 Generated for ${platform.toUpperCase()}: \n\n[Aapka professional output yahan show hoga]`;
                outputDiv.innerText = "";
                let i = 0;
                // Unique Typewriter Effect
                function type() {
                    if (i < sampleText.length) {
                        outputDiv.innerText += sampleText.charAt(i);
                        i++;
                        setTimeout(type, 15);
                    }
                }
                type();
            }, 800);
        }

        function copyText() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
